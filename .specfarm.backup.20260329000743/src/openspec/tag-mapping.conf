# OpenSpec Tag Mapping Configuration
# Format: openspec-tag=specfarm-type
#
# Maps OpenSpec-specific XML elements to SpecFarm equivalents.
# Lines starting with # are comments. Blank lines are ignored.
#
# Supported target types:
#   rule  — maps the element to a <rule> entry (will be evaluated for drift)
#   meta  — marks as metadata (logged but not scored)
#
# Examples:
#   soft-rule=rule         maps <soft-rule> to <rule>
#   community-vote=meta    marks <community-vote> as metadata (not scored)
#   license=meta           marks <license> as metadata (not scored)

soft-rule=rule
community-vote=meta
license=meta
